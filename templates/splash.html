<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SmartPay — Welcome</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; overflow: hidden; }
    body {
      font-family: 'DM Sans', sans-serif;
      background: #2C3320;
      display: flex; align-items: center; justify-content: center;
      position: relative;
    }

    /* ── BG GRADIENT ANIMATION ── */
    .bg {
      position: fixed; inset: 0; z-index: 0;
      background: #2C3320;
      animation: bgShift 8s ease-in-out infinite alternate;
    }
    @keyframes bgShift {
      0%   { background: #2C3320; }
      33%  { background: #3d4f2e; }
      66%  { background: #4a5e38; }
      100% { background: #606F49; }
    }

    /* ── CORNER DECORATIONS ── */
    .corner {
      position: fixed; border-radius: 50%;
      border: 1px solid rgba(181,201,154,.12);
      animation: slowSpin 20s linear infinite;
      z-index: 1; pointer-events: none;
    }
    .corner-tl { width: 500px; height: 500px; top: -250px; left: -250px; }
    .corner-br { width: 600px; height: 600px; bottom: -300px; right: -300px; animation-direction: reverse; animation-duration: 25s; }
    .corner-tr { width: 300px; height: 300px; top: -150px; right: -150px; animation-duration: 15s; }
    @keyframes slowSpin { to { transform: rotate(360deg); } }

    /* ── PARTICLES ── */
    .particles { position: fixed; inset: 0; z-index: 1; overflow: hidden; pointer-events: none; }
    .particle { position: absolute; border-radius: 50%; animation: floatUp linear infinite; bottom: -20px; }
    @keyframes floatUp {
      0%   { transform: translateY(0) scale(0); opacity: 0; }
      10%  { opacity: .5; }
      90%  { opacity: .15; }
      100% { transform: translateY(-110vh) scale(1.3); opacity: 0; }
    }

    /* ── SKIP BUTTON ── */
    .skip-btn {
      position: fixed; top: 1.5rem; right: 1.8rem; z-index: 100;
      color: rgba(181,201,154,.7); text-decoration: none;
      font-size: .85rem; font-weight: 500;
      padding: .4rem .9rem; border: 1px solid rgba(181,201,154,.2);
      border-radius: 20px; transition: all .3s;
      background: rgba(44,51,32,.4); backdrop-filter: blur(8px);
    }
    .skip-btn:hover { color: #CFE1B9; border-color: rgba(181,201,154,.5); }

    /* ── MAIN CONTENT ── */
    .splash-content {
      position: relative; z-index: 10; text-align: center;
      max-width: 700px; padding: 2rem;
      display: flex; flex-direction: column; align-items: center; gap: 0;
    }

    /* Logo / Icon */
    .splash-icon {
      opacity: 0; transform: scale(0.4);
      transition: opacity .8s cubic-bezier(.34,1.56,.64,1), transform .8s cubic-bezier(.34,1.56,.64,1);
      margin-bottom: 2rem;
    }
    .splash-icon.show { opacity: 1; transform: scale(1); }
    .splash-icon svg { width: 90px; height: 90px; filter: drop-shadow(0 8px 32px rgba(181,201,154,.4)); }

    /* SmartPay name */
    .splash-name {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(56px, 10vw, 88px);
      font-weight: 300; color: #fff; letter-spacing: .02em;
      margin-bottom: 1rem; min-height: 1.1em;
      text-shadow: 0 4px 32px rgba(0,0,0,.3);
    }
    .splash-name .cursor {
      display: inline-block; width: 3px; height: .9em;
      background: #B5C99A; margin-left: 4px; vertical-align: middle;
      animation: blink .8s step-end infinite;
    }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

    /* Tagline */
    .splash-tagline {
      font-size: clamp(1rem, 2.5vw, 1.25rem);
      color: rgba(207,225,185,.8); font-weight: 300;
      letter-spacing: .12em; text-transform: uppercase;
      margin-bottom: 2.2rem;
      opacity: 0; transform: translateY(12px);
      transition: opacity .7s, transform .7s;
    }
    .splash-tagline.show { opacity: 1; transform: translateY(0); }

    /* Feature Pills */
    .pills { display: flex; gap: 1rem; flex-wrap: wrap; justify-content: center; margin-bottom: 2.5rem; }
    .pill {
      background: rgba(181,201,154,.1); border: 1px solid rgba(181,201,154,.22);
      color: #CFE1B9; padding: .5rem 1.2rem; border-radius: 50px;
      font-size: .88rem; font-weight: 500;
      opacity: 0; transform: translateY(20px);
      transition: opacity .5s, transform .5s, background .2s;
    }
    .pill.show { opacity: 1; transform: translateY(0); }
    .pill:hover { background: rgba(181,201,154,.2); }

    /* Enter Button */
    .enter-btn {
      display: inline-flex; align-items: center; gap: .6rem;
      background: #B5C99A; color: #2C3320;
      padding: 1rem 2.5rem; border-radius: 50px;
      font-family: 'DM Sans', sans-serif; font-size: 1.05rem; font-weight: 700;
      text-decoration: none; cursor: pointer; border: none;
      box-shadow: 0 0 0 0 rgba(181,201,154,.5);
      opacity: 0; transform: translateY(16px);
      transition: opacity .6s, transform .6s, background .2s, box-shadow .2s;
      animation: none;
    }
    .enter-btn.show {
      opacity: 1; transform: translateY(0);
      animation: glowPulse 2.5s ease-in-out infinite;
    }
    .enter-btn:hover { background: #CFE1B9; box-shadow: 0 6px 28px rgba(0,0,0,.3); animation: none; }
    @keyframes glowPulse {
      0%,100% { box-shadow: 0 0 0 0 rgba(181,201,154,.5); }
      50%      { box-shadow: 0 0 0 16px rgba(181,201,154,0); }
    }

    /* Progress Bar */
    .progress-wrap {
      position: fixed; bottom: 0; left: 0; right: 0; z-index: 50;
      height: 3px; background: rgba(181,201,154,.12);
    }
    .progress-bar {
      height: 100%; width: 0%;
      background: linear-gradient(90deg, #849669, #B5C99A, #CFE1B9);
      transition: width 5.5s linear;
      box-shadow: 0 0 8px rgba(181,201,154,.6);
    }

    /* SmartBot (same component, inlined here) */
    .sb-fab {
      position: fixed; bottom: 28px; right: 28px; z-index: 9999;
      width: 58px; height: 58px; border-radius: 50%;
      background: #606F49; border: none; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.5rem;
      box-shadow: 0 4px 20px rgba(44,51,32,.45);
      transition: transform .2s, box-shadow .2s;
    }
    .sb-fab:hover { transform: scale(1.1); box-shadow: 0 8px 28px rgba(44,51,32,.55); }
    .sb-fab::before {
      content: ''; position: absolute; inset: -4px; border-radius: 50%;
      border: 2px solid rgba(181,201,154,.5);
      animation: sbRing 2s ease-out infinite;
    }
    @keyframes sbRing { 0%{transform:scale(1);opacity:.8} 100%{transform:scale(1.55);opacity:0} }
    .sb-notif {
      position: absolute; top: 2px; right: 2px;
      width: 12px; height: 12px; border-radius: 50%;
      background: #e74c3c; border: 2px solid #2C3320;
    }
  </style>
</head>
<body>

<div class="bg"></div>
<div class="corner corner-tl"></div>
<div class="corner corner-br"></div>
<div class="corner corner-tr"></div>

<!-- Particles --> 
<div class="particles" id="particles"></div>

<a href="/" class="skip-btn">Skip →</a>

<!-- Main Content -->
<div class="splash-content">
  <!-- Shield Icon -->
  <div class="splash-icon" id="splashIcon">
    <svg viewBox="0 0 90 90" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M45 6L11 20V45C11 63 25 79 45 85C65 79 79 63 79 45V20L45 6Z" fill="rgba(181,201,154,.2)" stroke="rgba(181,201,154,.6)" stroke-width="1.5"/>
      <path d="M45 6L11 20V45C11 63 25 79 45 85C65 79 79 63 79 45V20L45 6Z" fill="url(#sg)" opacity=".5"/>
      <path d="M31 45L40 54L59 36" stroke="#CFE1B9" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
      <circle cx="45" cy="30" r="6" fill="rgba(181,201,154,.3)" stroke="#B5C99A" stroke-width="1"/>
      <defs>
        <linearGradient id="sg" x1="11" y1="6" x2="79" y2="85" gradientUnits="userSpaceOnUse">
          <stop stop-color="#B5C99A" stop-opacity=".4"/>
          <stop offset="1" stop-color="#606F49" stop-opacity=".1"/>
        </linearGradient>
      </defs>
    </svg>
  </div>

  <!-- SmartPay name (typewriter) -->
  <div class="splash-name" id="splashName"><span id="typeTarget"></span><span class="cursor" id="cursor"></span></div>

  <!-- Tagline -->
  <div class="splash-tagline" id="splashTagline">AI-Powered BNPL Platform</div>

  <!-- Feature pills -->
  <div class="pills">
    <div class="pill" id="pill1">🛡 Fraud Detection</div>
    <div class="pill" id="pill2">⚡ Instant Credit</div>
    <div class="pill" id="pill3">🔒 Secure KYC</div>
  </div>

  <!-- Enter button -->
  <a href="/" class="enter-btn" id="enterBtn">Enter SmartPay &nbsp;→</a>
</div>

<!-- Progress bar -->
<div class="progress-wrap"><div class="progress-bar" id="progressBar"></div></div>

<!-- SmartBot FAB (minimal version on splash) -->
<button class="sb-fab" onclick="window.location.href='/'" title="Enter SmartPay">🤖<div class="sb-notif" id="sbNotif"></div></button>

<script>
  /* ── PARTICLES ── */
  const pWrap = document.getElementById('particles');
  const COLORS = ['#849669','#97A97C','#B5C99A','#CFE1B9','#728359'];
  for (let i = 0; i < 30; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    const size = 4 + Math.random() * 16;
    p.style.cssText = `width:${size}px;height:${size}px;
      background:${COLORS[Math.floor(Math.random()*COLORS.length)]};
      left:${Math.random()*100}%;
      animation-duration:${8 + Math.random()*14}s;
      animation-delay:${Math.random()*8}s;
      opacity:0;`;
    pWrap.appendChild(p);
  }

  /* ── ANIMATION SEQUENCE ── */
  const WORD = 'SmartPay';
  const typeEl = document.getElementById('typeTarget');
  const cursor = document.getElementById('cursor');

  function typewriter(word, done) {
    let i = 0;
    function tick() {
      typeEl.textContent = word.slice(0, ++i);
      if (i < word.length) setTimeout(tick, 90);
      else { setTimeout(() => cursor.style.display = 'none', 600); done && done(); }
    }
    tick();
  }

  // 0.5s — icon
  setTimeout(() => document.getElementById('splashIcon').classList.add('show'), 500);
  // 1.2s — typewriter
  setTimeout(() => typewriter(WORD), 1200);
  // 2.0s — tagline
  setTimeout(() => document.getElementById('splashTagline').classList.add('show'), 2000);
  // 2.8s — pills staggered
  setTimeout(() => document.getElementById('pill1').classList.add('show'), 2800);
  setTimeout(() => document.getElementById('pill2').classList.add('show'), 3100);
  setTimeout(() => document.getElementById('pill3').classList.add('show'), 3400);
  // 3.8s — enter button
  setTimeout(() => document.getElementById('enterBtn').classList.add('show'), 3800);
  // 5.5s — auto redirect
  setTimeout(() => { window.location.href = '/'; }, 5500);

  /* ── PROGRESS BAR ── */
  requestAnimationFrame(() => {
    requestAnimationFrame(() => {
      document.getElementById('progressBar').style.width = '100%';
    });
  });

  /* ── NOTIF dot: remove on click ── */
  document.querySelector('.sb-fab').addEventListener('click', () => {
    const n = document.getElementById('sbNotif');
    if (n) n.remove();
  }, { once: true });
</script>
</body>
</html>
